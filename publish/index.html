<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content, user-scalable=no">
  <meta name="color-scheme" content="light">
  <title>华夏人生</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./game.css">
  <link rel="stylesheet" href="./menus.css">
  <link rel="stylesheet" href="./screens.css">
  <link rel="stylesheet" href="./systems.css">
  <link rel="stylesheet" href="./career.css">
  <link rel="stylesheet" href="./life-loop.css">
  <script src="./config.js" defer></script>
  <script src="./name-catalog.js" defer></script>
  <script src="./world-data.js" defer></script>
  <script src="./genetics-catalog.js" defer></script>
  <script src="./genetics.js" defer></script>
  <script src="./genetics-growth.js" defer></script>
  <script src="./appearance-catalog.js" defer></script>
  <script src="./cosplay-wuwa.js" defer></script>
  <script src="./cosplay-catalog.js" defer></script>
  <script src="./content.js" defer></script>
  <script src="./state-upgrade.js" defer></script>
  <script src="./sdk-adapter.js" defer></script>
  <script src="./storage.js" defer></script>
  <script src="./style-reference.js" defer></script>
  <script src="./portrait-gallery.js" defer></script>
  <script src="./portrait-system.js" defer></script>
  <script src="./profile.js" defer></script>
  <script src="./social.js" defer></script>
  <script src="./matchmaking.js" defer></script>
  <script src="./family-system.js" defer></script>
  <script src="./career.js" defer></script>
  <script src="./career-view.js" defer></script>
  <script src="./travel.js" defer></script>
  <script src="./assets-system.js" defer></script>
  <script src="./npc-life.js" defer></script>
  <script src="./life-loop.js" defer></script>
  <script src="./ai-director.js" defer></script>
  <script src="./navigation.js" defer></script>
  <script src="./appearance.js" defer></script>
  <script src="./view.js" defer></script>
  <script src="./actions.js" defer></script>
  <script src="./interaction-router.js" defer></script>
  <script src="./app.js" defer></script>
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <canvas id="heroCanvas" aria-hidden="true"></canvas>
      <div class="hero-top">
        <div class="seal">生</div>
        <button class="icon-btn" id="resetBtn" type="button" title="重新开始" aria-label="重新开始">↻</button>
      </div>
      <div class="profile">
        <p>华夏人生档案</p>
        <h1 id="profileName">正在出生</h1>
        <span id="profileMeta"></span>
      </div>
      <time id="lifeDate"></time>
    </header>

    <section class="summary" aria-label="人生概况">
      <div><span>年龄</span><strong id="ageValue">0岁</strong></div>
      <div><span>阶段</span><strong id="stageValue">幼儿期</strong></div>
      <div><span>现金</span><strong id="moneyValue">¥0</strong></div>
    </section>

    <nav class="tabs" id="tabs" aria-label="人生页面">
      <button type="button" class="active" data-tab="timelinePage">人生</button>
      <button type="button" data-tab="rolePage">角色</button>
      <button type="button" data-tab="relationsPage">关系</button>
      <button type="button" data-tab="developmentPage">发展</button>
      <button type="button" data-tab="assetsPage">资产</button>
    </nav>

    <section class="tab-pages" id="tabPages">
      <div class="page active" id="timelinePage">
        <section class="panel goal-panel" id="goalPanel"></section>
        <details class="fold-section" open>
          <summary><span>当前状态</span><small>属性与本月行动</small></summary>
          <div class="fold-content">
            <div class="stat-grid" id="statGrid"></div>
            <div class="action-strip" id="actionStrip">
              <button type="button" data-activity="study"><b>学</b><span>学习</span></button>
              <button type="button" data-activity="sport"><b>炼</b><span>锻炼</span></button>
              <button type="button" data-activity="social"><b>友</b><span>社交</span></button>
              <button type="button" data-activity="rest"><b>闲</b><span>休息</span></button>
            </div>
          </div>
        </details>
        <details class="fold-section">
          <summary><span>人生纪事</span><small>最近 60 条</small></summary>
          <div class="fold-content event-scroll"><div class="event-list" id="eventList"></div></div>
        </details>
      </div>

      <div class="page" id="rolePage">
        <div class="module-directory">
          <button data-open-module="roleArchive" data-module-title="角色档案"><b>档</b><span><strong>角色档案</strong><small>立绘、成长信息、性格与特质</small></span><i>›</i></button>
          <button data-open-module="roleAppearance" data-module-title="外观与穿着"><b>装</b><span><strong>外观与穿着</strong><small>发型、气质及三部位穿搭</small></span><i>›</i></button>
        </div>
      </div>

      <div class="page" id="relationsPage">
        <div class="module-directory">
          <button data-open-module="familySubpage" data-module-title="家庭"><b>家</b><span><strong>家庭</strong><small>父母、兄弟姐妹、配偶与儿女</small></span><i>›</i></button>
          <button data-open-module="schoolSubpage" data-module-title="同窗"><b>同</b><span><strong>同窗</strong><small>当前学校中的同学与关系</small></span><i>›</i></button>
          <button data-open-module="phoneSubpage" data-module-title="手机联系"><b>联</b><span><strong>手机联系</strong><small>毕业后仍可联系的旧同学</small></span><i>›</i></button>
          <button data-open-module="matchmakingSubpage" data-module-title="城市相亲"><b>缘</b><span><strong>城市相亲</strong><small>筛选对象、约会、告白与结婚</small></span><i>›</i></button>
        </div>
      </div>

      <div class="page" id="developmentPage">
        <div class="module-directory">
          <button data-open-module="studySubpage" data-module-title="学习"><b>学</b><span><strong>学习</strong><small>学校、考试成绩与升学进度</small></span><i>›</i></button>
          <button data-open-module="careerSubpage" data-module-title="求职"><b>职</b><span><strong>求职</strong><small>浏览岗位并承担录取风险</small></span><i>›</i></button>
          <button data-open-module="citySubpage" data-module-title="迁居"><b>迁</b><span><strong>迁居</strong><small>前往其他城市寻找不同机会</small></span><i>›</i></button>
          <button data-open-module="travelSubpage" data-module-title="街区旅途"><b>游</b><span><strong>街区旅途</strong><small>上街探索并遇到新的角色</small></span><i>›</i></button>
        </div>
      </div>

      <div class="page" id="assetsPage">
        <div class="module-directory">
          <button data-open-module="propertySubpage" data-module-title="房产"><b>房</b><span><strong>房产</strong><small>查看住房、首付与月供</small></span><i>›</i></button>
          <button data-open-module="stockSubpage" data-module-title="股票"><b>股</b><span><strong>股票</strong><small>查看行情并买卖持仓</small></span><i>›</i></button>
          <button data-open-module="industrySubpage" data-module-title="产业与座驾"><b>产</b><span><strong>产业与座驾</strong><small>经营现金流与购买交通工具</small></span><i>›</i></button>
        </div>
      </div>
    </section>

    <footer class="time-controls">
      <button id="monthBtn" type="button"><span>推进</span><strong>下个月</strong></button>
      <button id="yearBtn" type="button"><span>快进</span><strong>下一年</strong></button>
    </footer>
  </main>

  <section class="screen-layer" id="moduleScreen" hidden aria-label="功能子菜单">
    <header class="screen-header">
      <button class="screen-back" id="moduleBackBtn" type="button" aria-label="返回主页面">‹</button>
      <h2 id="moduleTitle">子菜单</h2>
    </header>
    <div class="screen-scroll" id="moduleContent">
      <div class="module-view" id="roleArchive">
        <section class="panel portrait-panel">
          <button class="portrait-slot" id="portraitSlot" type="button" title="查看立绘大图" aria-label="查看立绘大图"></button>
          <div class="portrait-actions"><p id="portraitStatus"></p>
            <label class="prompt-field"><span>附加提示词 · 权重1.8</span>
              <input id="portraitPromptInput" maxlength="120" placeholder="例如：戴金丝眼镜、手持书本"></label>
            <button id="generatePortraitBtn" type="button">生成角色立绘</button></div>
        </section>
        <details class="fold-section" open>
          <summary><span>成长档案</span><small>身高、外貌与气质</small></summary>
          <div class="fold-content"><div class="profile-facts" id="profileFacts"></div>
            <h3>性格与特质</h3><div class="trait-grid" id="traitGrid"></div></div>
        </details>
        <details class="fold-section">
          <summary><span>遗传档案</span><small>DNA 与实际表达</small></summary>
          <div class="fold-content"><div class="gene-facts" id="geneFacts"></div></div>
        </details>
      </div>
      <div class="module-view" id="roleAppearance">
        <details class="fold-section" open>
          <summary><span>外观与穿着</span><small>分组选择造型</small></summary>
          <div class="fold-content"><div class="profile-editor" id="profileEditor"></div></div>
        </details>
      </div>
      <div class="module-view" id="familySubpage"><section class="panel">
        <div class="panel-title"><h2>家庭关系</h2><span>点击头像查看详情</span></div>
        <div id="familyList"></div>
        <button class="wide-action" id="childPlanBtn" type="button">计划孩子</button>
      </section></div>
      <div class="module-view" id="schoolSubpage"><section class="panel">
        <div class="panel-title"><h2>当前同窗</h2><span>点击头像查看详情</span></div>
        <div id="classmatesList"></div>
      </section></div>
      <div class="module-view" id="phoneSubpage"><section class="panel">
        <div class="panel-title"><h2>手机联系人</h2><span>历史同窗</span></div>
        <div id="phoneList"></div>
      </section></div>
      <div class="module-view" id="matchmakingSubpage"><section class="panel">
        <div class="panel-title"><h2>城市相亲</h2><span>成年关系</span></div>
        <div id="matchmakingList"></div>
      </section></div>
      <div class="module-view" id="studySubpage"><section class="panel">
        <div class="panel-title"><h2>教育经历</h2><span>学业与考试</span></div>
        <div id="educationPanel"></div>
      </section></div>
      <div class="module-view" id="careerSubpage"><section class="panel">
        <div class="panel-title"><h2>职业市场</h2><span>当前招聘</span></div>
        <div id="careerPanel"></div>
      </section></div>
      <div class="module-view" id="citySubpage"><section class="panel">
        <div class="panel-title"><h2>城市迁移</h2><span>城市列表</span></div>
        <div id="cityPanel"></div>
      </section></div>
      <div class="module-view" id="travelSubpage"><section class="panel">
        <div class="panel-title"><h2>街区旅途</h2><span>自由探索</span></div>
        <div id="travelPanel"></div>
      </section></div>
      <div class="module-view" id="propertySubpage"><section class="panel">
        <div class="panel-title"><h2>房产配置</h2><span>首付与月供</span></div>
        <div id="propertyPanel"></div>
      </section></div>
      <div class="module-view" id="stockSubpage"><section class="panel">
        <div class="panel-title"><h2>股票市场</h2><span>每月价格波动</span></div>
        <div id="stockPanel"></div>
      </section></div>
      <div class="module-view" id="industrySubpage"><section class="panel">
        <div class="panel-title"><h2>产业与座驾</h2><span>长期资产</span></div>
        <div id="industryPanel"></div>
      </section></div>
    </div>
  </section>

  <section class="screen-layer detail-layer" id="detailScreen" hidden aria-label="详情页面">
    <header class="screen-header">
      <button class="screen-back" id="detailBackBtn" type="button" aria-label="返回子菜单">‹</button>
      <h2 id="detailTitle">角色详情</h2>
    </header>
    <div class="screen-scroll" id="detailContent"></div>
  </section>

  <section class="screen-layer portrait-viewer" id="portraitViewer" hidden aria-label="立绘大图">
    <header class="screen-header">
      <button class="screen-back" id="portraitViewerBackBtn" type="button" aria-label="返回角色页面">‹</button>
      <h2 id="portraitViewerTitle">角色立绘</h2>
    </header>
    <div class="screen-scroll portrait-viewer-scroll" id="portraitViewerContent"></div>
  </section>

  <div class="decision-backdrop" id="decision" hidden>
    <section class="decision-sheet" role="dialog" aria-modal="true" aria-labelledby="decisionTitle">
      <span class="sheet-handle" aria-hidden="true"></span>
      <p>关键人生选择</p>
      <h2 id="decisionTitle"></h2>
      <div class="decision-text" id="decisionText"></div>
      <div class="decision-body" id="decisionBody"></div>
    </section>
  </div>
  <div class="toast" id="toast" role="status" hidden></div>
</body>
</html>
